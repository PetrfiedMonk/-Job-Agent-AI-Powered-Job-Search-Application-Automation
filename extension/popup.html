<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Job Agent</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{width:300px;background:#0d1528;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;}

  .header{background:linear-gradient(135deg,#0d1528 0%,#1a2540 100%);border-bottom:1px solid rgba(0,212,255,.2);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;}
  .logo{width:30px;height:30px;background:radial-gradient(circle,#00ff88 0%,#00d4ff 55%,#0d1528 100%);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0d1528;letter-spacing:-.5px;flex-shrink:0;}
  .header-text{flex:1;min-width:0;}
  .header-name{font-weight:700;font-size:14px;color:#fff;}
  .header-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
  .open-btn{background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.25);color:#00d4ff;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0;}
  .open-btn:hover{background:rgba(0,212,255,.2);}

  .status-card{margin:12px 12px 0;background:#111c35;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;}
  .status-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s;}
  .dot.running{background:#00d4ff;box-shadow:0 0 7px #00d4ff;animation:pulse 1.5s ease-in-out infinite;}
  .dot.idle{background:#555;}
  .dot.offline{background:#ff6b6b;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .status-lbl{font-weight:700;font-size:12px;letter-spacing:.04em;}
  .status-lbl.running{color:#00d4ff;}
  .status-lbl.idle{color:#888;}
  .status-lbl.offline{color:#ff6b6b;}
  .step-lbl{margin-left:auto;font-size:10px;color:rgba(255,255,255,.3);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;}
  .stat{background:rgba(255,255,255,.04);border-radius:6px;padding:6px 4px;text-align:center;}
  .stat-n{font-size:17px;font-weight:700;color:#00d4ff;}
  .stat-n.applied{color:#00ff88;}
  .stat-n.scored{color:#b48eff;}
  .stat-l{font-size:10px;color:rgba(255,255,255,.38);margin-top:1px;}

  .divider{height:1px;background:rgba(255,255,255,.06);margin:10px 12px 0;}

  .job-card{margin:10px 12px 0;background:#111c35;border:1px solid rgba(0,212,255,.3);border-radius:10px;padding:12px 14px;}
  .job-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2);border-radius:4px;padding:2px 7px;font-size:10px;color:#00d4ff;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
  .job-title{font-size:13px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:2px;}
  .job-company{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:10px;}
  .track-btn{width:100%;background:linear-gradient(135deg,#00d4ff,#00ff88);color:#0d1528;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.05em;transition:filter .15s;}
  .track-btn:hover{filter:brightness(1.1);}
  .track-btn:disabled{opacity:.5;cursor:default;filter:none;}
  .track-ok{color:#00ff88;font-size:11px;text-align:center;margin-top:6px;display:none;}

  .footer{padding:10px 12px 12px;display:flex;gap:6px;}
  .foot-btn{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.55);border-radius:6px;padding:6px;cursor:pointer;font-size:11px;text-align:center;}
  .foot-btn:hover{background:rgba(255,255,255,.08);color:#fff;}

  .offline-card{margin:12px;background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.2);border-radius:10px;padding:14px;font-size:12px;color:rgba(255,255,255,.55);line-height:1.65;}
  .offline-card a{color:#00d4ff;text-decoration:none;cursor:pointer;}
</style>
</head>
<body>
<div class="header">
  <div class="logo">JA</div>
  <div class="header-text">
    <div class="header-name">Job Agent</div>
    <div class="header-sub" id="hdr-sub">Connecting…</div>
  </div>
  <button class="open-btn" id="open-ui">Open UI ↗</button>
</div>
<div id="content"></div>
<script src="popup.js"></script>
</body>
</html>
